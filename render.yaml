services:
  - type: web
    plan: free
    name: docuseal
    env: docker
    autoDeploy: false
    repo: https://github.com/AlexBTurchyn/docuseal.git
    branch: fix-redis-localhost
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docuseal-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
databases:
  - name: docuseal-db
    plan: free
